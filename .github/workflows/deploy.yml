name: Deploy to VPS (Optimized CD)

on:
  push:
    branches:
      - main

jobs:
  # Job de Integración Continua (Opcional pero recomendado)
  build-and-test:
    name: Build & Test Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-with-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Build Frontend Artifacts
        run: |
          cd frontend
          npm ci
          npm run build

      # Guardar el artefacto compilado para el siguiente Job
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/ # Cambiar a build/ si no usas Vite

  deploy:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Descargar la compilación limpia del frontend
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend-dist

      # Configurar SSH de forma segura usando la acción oficial
      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # Registrar el Host en known_hosts de forma segura
      - name: Add SSH Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_SSH_HOST }}" >> ~/.ssh/known_hosts

      # Transferir archivos limpios al VPS sin compilar allá
      - name: Transfer Artifacts and Source
        run: |
          # Sincronizar el backend (excluyendo node_modules antiguos)
          rsync -avz --delete ./backend/ ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}:/var/www/sistema-asistencia/backend/
          
          # Sincronizar el frontend ya compilado directamente a la carpeta pública del VPS
          rsync -avz --delete ./frontend-dist/ ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}:/var/www/sistema-asistencia/frontend/dist/

      # Ejecutar solo tareas de orquestación y reinicio en el VPS
      - name: Execute Remote Deployment Commands
        run: |
          ssh "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}" << 'EOF'
            cd /var/www/sistema-asistencia/backend || exit 1
            
            echo "Instalando dependencias de producción en el Backend..."
            npm install --omit=dev || { echo "Error en npm install backend"; exit 1; }
            
            echo "Reiniciando backend con PM2..."
            npx pm2 restart ecosystem.config.js || npx pm2 start ecosystem.config.js || { echo "Error al iniciar con PM2"; exit 1; }
            
            npx pm2 save
            echo "🎉 ¡Despliegue completado con éxito!"
          EOF
