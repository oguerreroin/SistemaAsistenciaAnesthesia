name: Deploy to VPS (Optimized CD)

on:
  push:
    branches:
      - main

jobs:
  # Job de Build & Test - Verificar que todo compila correctamente antes de desplegar
  build-and-test:
    name: Build & Test Artifacts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Frontend: Instalar dependencias y compilar
      - name: Build Frontend Artifacts
        run: |
          cd frontend
          npm install
          npm run build
          echo "✅ Frontend compilado exitosamente"

      # Frontend: Ejecutar Lint (Permisivo para no bloquear el despliegue)
      - name: Lint Frontend Code
        run: |
          cd frontend
          npm run lint || echo "⚠️ Hay advertencias de linting en App.jsx, pero se continúa con el despliegue."
          echo "✅ Validación de Linting completada"

      # Backend: Validar que instala correctamente
      - name: Validate Backend Dependencies
        run: |
          cd backend
          npm install
          echo "✅ Dependencias del backend validadas"

      # Guardar el artefacto compilado del frontend para el siguiente Job
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # Job de Despliegue - Ejecuta solo cuando el build fue exitoso
  deploy:
    name: Deploy to Production VPS
    needs: build-and-test
    runs-on: ubuntu-latest
    
    environment:
      name: production
      url: https://sistema-asistencia.local  # Cambiar por tu URL real

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Descargar la compilación limpia del frontend
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend-dist

      # Configurar SSH de forma segura usando la acción oficial
      - name: Configure SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
          ssh-known-hosts: ${{ secrets.VPS_SSH_HOST }}

      # Transferir archivos limpios al VPS sin compilar allá
      - name: Transfer Artifacts to VPS
        run: |
          # Sincronizar el backend (excluyendo node_modules antiguos y .git)
          echo "📤 Sincronizando backend..."
          rsync -avz --delete \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.env \
            ./backend/ \
            ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}:/var/www/sistema-asistencia/backend/
          
          # Sincronizar el frontend ya compilado directamente a la carpeta pública del VPS
          echo "📤 Sincronizando frontend compilado..."
          rsync -avz --delete \
            ./frontend-dist/ \
            ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}:/var/www/sistema-asistencia/frontend/dist/
          
          echo "✅ Archivos transferidos exitosamente"

      # Ejecutar solo tareas de orquestación y reinicio en el VPS
      - name: Execute Remote Deployment Commands
        run: |
          ssh ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }} << 'EOF'
            set -e
            
            cd /var/www/sistema-asistencia/backend || { echo "❌ Error: Carpeta backend no encontrada"; exit 1; }
            
            echo "📦 Instalando dependencias en el Backend..."
            npm install --production || { echo "❌ Error en npm install backend"; exit 1; }
            
            echo "🔄 Reiniciando backend con PM2..."
            npx pm2 restart ecosystem.config.js 2>/dev/null || npx pm2 start ecosystem.config.js || { echo "❌ Error al iniciar con PM2"; exit 1; }
            
            # Guardar configuración de PM2
            npx pm2 save
            
            幕==========================================================
            echo "✅ ¡Despliegue completado exitosamente en Producción!"
            echo "=========================================================="
            echo "Frontend: /var/www/sistema-asistencia/frontend/dist/"
            echo "Backend: /var/www/sistema-asistencia/backend"
            echo "=========================================================="
          EOF

      # Notificación de éxito
      - name: Deployment Success
        if: success()
        run: |
          echo "🎉 Despliegue a producción completado"
          echo "⏰ Fecha: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      # Notificación de fallo
      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ El despliegue falló"
          echo "⏰ Fecha: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          exit 1
