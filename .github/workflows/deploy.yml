name: Deploy to VPS (GitOps CI/CD)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Ir al directorio del proyecto
            cd /var/www/sistema-asistencia || exit 1

            # Descartar cualquier cambio local accidental y hacer pull
            git reset --hard HEAD
            git pull origin main

            # 1. Configurar y Compilar el Frontend
            cd frontend
            echo "Instalando dependencias del Frontend..."
            npm install
            echo "Compilando Frontend..."
            npm run build

            # 2. Configurar e Iniciar/Reiniciar el Backend con PM2
            cd ../backend
            echo "Instalando dependencias de producción del Backend..."
            npm install --omit=dev
            
            # Reiniciar la app con PM2 (si ya existe el proceso) o iniciarla usando el ecosistema
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            
            # Guardar el estado de PM2
            pm2 save
            
            echo "¡Despliegue de GitOps completado con éxito en el VPS!"
