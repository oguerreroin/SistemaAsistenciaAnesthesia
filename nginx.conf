# Configuración de Nginx para Servir el Sistema de Asistencia (Producción)
# Ubicación típica en Ubuntu: /etc/nginx/sites-available/sistema-asistencia

server {
    listen 80;
    server_name _; # Reemplazar con el dominio o IP pública del VPS (ej: asistencia.clinica.pe o 168.12.34.56)

    # Límite máximo de carga de archivos (Esencial para las capturas de fotos de la cámara web)
    client_max_body_size 12M;

    # Compresión GZIP para optimizar el ancho de banda y velocidad de carga en el VPS
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    gzip_proxied any;

    # 1. FRONTEND: Servir los archivos estáticos de la Single Page Application (React + Vite)
    location / {
        root /var/www/sistema-asistencia/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Caching óptimo para assets compilados por Vite (tienen hashes únicos)
        location ~* \.(?:css|js|woff2?|svg|gif|png|jpe?g|webp|ico)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }
    }

    # 2. MEDIA BYPASS: Servir las fotos subidas a disco DIRECTAMENTE con Nginx
    # Evita que Node.js consuma memoria RAM sirviendo archivos binarios pesados.
    location /storage/ {
        alias /var/www/sistema-asistencia/backend/storage/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        
        # Habilitar CORS para evitar problemas de visualización cruzada
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
    }

    # 3. BACKEND API: Reverse Proxy para el Servidor Express.js (corriendo bajo PM2)
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        
        # Cabeceras de Proxy estándar
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Pasar IPs reales de los clientes para auditoría de asistencia
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Configuración de timeouts rápidos para evitar conexiones zombie
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # Logs de acceso y error optimizados
    access_log /var/log/nginx/asistencia-access.log;
    error_log /var/log/nginx/asistencia-error.log warn;
}
